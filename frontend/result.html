<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Result</title>
</head>
<body>

<h2>Product Result</h2>

<p id="output">Loading...</p>

<button onclick="scanAgain()">Scan Again</button>

<script>
// get scanned QR from storage
const qr = localStorage.getItem("qr");

// check if QR exists
if (!qr) {
  document.getElementById("output").innerText = "No QR scanned";
} else {
  // call backend
  fetch(`https://qrcode-product-3.onrender.com/api/products/${qr}`)
    .then(res => res.json())
    .then(data => {
      if (data && data.price) {
        document.getElementById("output").innerText =
          "QR: " + qr + " | Price: $" + data.price;
      } else {
        document.getElementById("output").innerText =
          "Product not found";
      }
    })
    .catch(err => {
      document.getElementById("output").innerText =
        "Error connecting to server";
    });
}

// go back to scan page
function scanAgain() {
  window.location.href = "scan.html";
}
</script>
</body>
</html>
