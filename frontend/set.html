<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Price</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial, sans-serif;
}

#loadingPopup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-content{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid #ddd;
    border-top:5px solid #3498db;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<h2>Scan Product QR to Set Price</h2>

<!-- QR Scanner -->
<div id="reader" style="width:300px;"></div>

<hr>

<h3>Scanned QR:</h3>
<p id="qrText">Waiting for scan...</p>

<input id="price" type="number" placeholder="Enter price">

<br><br>

<button onclick="savePrice()">Save Price</button>

<div>
    <a href="scan.html">Scan Page</a>
</div>

<!-- Loading Popup -->
<div id="loadingPopup">
    <div class="popup-content">
        <div class="spinner"></div>
        <h3>Saving...</h3>
        <p>Please wait</p>
    </div>
</div>

<script>
let currentQR = null;

// QR Scan Success
function onScanSuccess(decodedText) {
    currentQR = decodedText;
    document.getElementById("qrText").innerText = decodedText;
}

// Start Scanner
const scanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250,
        formatsToSupport: [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39
        ]
    }
);

scanner.render(onScanSuccess);

// Save Price
async function savePrice() {
    const price = document.getElementById("price").value;

    if (!currentQR) {
        alert("Scan a QR first!");
        return;
    }

    if (!price) {
        alert("Enter a price!");
        return;
    }

    // Show loading popup
    document.getElementById("loadingPopup").style.display = "flex";

    try {
        const response = await fetch(
            "https://qrcode-product3.onrender.com/api/products/update",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    qr: currentQR,
                    price: price
                })
            }
        );

        const data = await response.json();

        // Hide popup
        document.getElementById("loadingPopup").style.display = "none";

        alert("✅ Price saved successfully!");

        document.getElementById("price").value = "";
    }
    catch(error) {
        document.getElementById("loadingPopup").style.display = "none";

        alert("❌ Error saving data");
        console.error(error);
    }
}
</script>

</body>
</html>
